name: Desktop Brewery - Build Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'images/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 18 * * 5' # Weekly build on Friday at 18:00 UTC (11:30 PM IST)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/debian-testing-cosmic-sysext
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Optimized Sysext
        uses: docker/build-push-action@v5
        with:
          context: ./images/debian-testing-cosmic-sysext
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 1. Enable Native GitHub Caching
          cache-from: type=gha
          # 2. 'mode=max' exports the BuildKit mounts (--mount=type=cache) 
          # from the Dockerfile into the GHA cache backend (10GB limit).
          cache-to: type=gha,mode=max
