name: Desktop Brewery - Build Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'images/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 18 * * 5' # Weekly build on Friday at 18:00 UTC (11:30 PM IST)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-testing-cosmic-sysext
            context: ./images/debian-testing-cosmic-sysext
            image: debian-testing-cosmic-sysext
          - name: debian-testing-cosmic-utils-sysext
            context: ./images/debian-testing-cosmic-utils-sysext
            image: debian-testing-cosmic-utils-sysext

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
