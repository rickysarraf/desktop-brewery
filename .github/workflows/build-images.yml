name: Desktop Brewery - Build Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'images/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 18 * * 5' # Weekly build on Friday at 18:00 UTC (11:30 PM IST)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/debian-testing-cosmic-sysext
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Optimized Sysext
        uses: docker/build-push-action@v5
        with:
          context: ./images/debian-testing-cosmic-sysext
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Switch to LOCAL caching for Docker. 
          # This is the most reliable way to persist internal BuildKit mounts (--mount=type=cache)
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Move cache to avoid infinite growth
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
